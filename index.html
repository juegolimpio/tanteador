<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tanteador EF</title>
<style>
:root {
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--surface3:#2d333b;
  --aa:#58a6ff;--ab:#f0883e;--text:#e6edf3;--muted:#768390;
  --border:rgba(255,255,255,0.1);--ok:#3fb950;--red:#f85149;--warn:#d29922;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:14px 6px;border:none;background:transparent;color:var(--muted);font-size:15px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab.active{color:var(--text);border-bottom-color:var(--aa)}
.status{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 16px;text-align:center;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:8px;min-height:44px;flex-shrink:0}
.badge{background:var(--surface2);padding:2px 10px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap}
.status.ws{background:rgba(210,153,34,.12);color:#e3b341}
.scoreboard{flex:1;display:grid;grid-template-columns:1fr 24px 1fr;align-items:center;padding:16px 10px 10px;gap:6px;min-height:0}
.team{display:flex;flex-direction:column;align-items:center;gap:8px}
.team-name{width:100%;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:14px;font-weight:700;padding:7px 8px;text-transform:uppercase;letter-spacing:.06em}
.team-name:focus{outline:none;border-color:var(--aa)}
.serve-row{height:18px;display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;font-weight:600;color:var(--aa);opacity:0;transition:opacity .2s}
.serve-row.v{opacity:1}
.serve-dot{width:8px;height:8px;border-radius:50%;background:var(--aa);box-shadow:0 0 8px var(--aa)}
.score{font-size:clamp(88px,26vw,140px);font-weight:900;line-height:1;cursor:pointer;user-select:none;transition:transform .08s;letter-spacing:-4px}
.score:active{transform:scale(.91)}
.score.a{color:var(--aa)}.score.b{color:var(--ab)}
.btn-row{display:flex;gap:5px}
.bp{padding:11px 13px;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;transition:transform .08s,opacity .1s;min-width:44px}
.bp:active{transform:scale(.93);opacity:.75}
.baa{background:var(--aa);color:#0d1117}.bsa{background:rgba(88,166,255,.15);color:var(--aa);border:1px solid rgba(88,166,255,.25)}
.bab{background:var(--ab);color:#0d1117}.bsb{background:rgba(240,136,62,.15);color:var(--ab);border:1px solid rgba(240,136,62,.25)}
.vs{font-size:18px;color:var(--muted);font-weight:300}
.history-bar{background:var(--surface);border-top:1px solid var(--border);padding:9px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:48px;flex-shrink:0}
.hl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:3px 10px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid transparent}
.wa{background:rgba(88,166,255,.12);color:#93c5fd;border-color:rgba(88,166,255,.25)}
.wb{background:rgba(240,136,62,.12);color:#fdba74;border-color:rgba(240,136,62,.25)}
.wt{background:var(--surface2);color:var(--muted);border-color:var(--border)}
.timer-block{background:var(--surface);border-top:1px solid var(--border);padding:12px 14px;flex-shrink:0}
.timer-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tdisp{font-size:44px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-1px;min-width:110px;transition:color .3s}
.tdisp.run{color:var(--ok)}.tdisp.zero{color:var(--red)}.tdisp.idle{color:var(--text)}
.tbtns{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tb{padding:9px 14px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.tb:active{opacity:.7;transform:scale(.96)}
.tb.go{background:var(--ok);color:#0d1117;border-color:transparent}
.tb.pause{background:var(--warn);color:#0d1117;border-color:transparent}
.presets{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.pbtn{padding:6px 12px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer}
.pbtn:active{opacity:.7}
.pbtn.ap{border-color:var(--aa);color:var(--aa);background:rgba(88,166,255,.1)}
.mrow{display:flex;align-items:center;gap:8px;margin-top:8px}
.minp{width:62px;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;font-weight:600;text-align:center}
.minp:focus{outline:none;border-color:var(--aa)}
.mlbl{font-size:13px;color:var(--muted)}
.bottom-bar{background:var(--surface);border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;flex-shrink:0}
.ctrl{flex:1;padding:12px 8px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;text-align:center}
.ctrl:active{opacity:.6;transform:scale(.97)}
.ctrl.red{border-color:rgba(248,81,73,.35);color:var(--red)}
.ctrl.blue{border-color:rgba(88,166,255,.35);color:var(--aa)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r) var(--r) 0 0;border:1px solid var(--border);padding:20px 20px 36px;width:100%;max-height:85dvh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:700;margin-bottom:18px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.finp{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:16px;font-weight:600}
.finp:focus{outline:none;border-color:var(--aa)}
.qbs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.qb{padding:8px 16px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:15px;font-weight:600;cursor:pointer}
.qb.sel{border-color:var(--aa);color:var(--aa);background:rgba(88,166,255,.1)}
.mbtns{display:flex;gap:10px;margin-top:20px}
.mbtn{flex:1;padding:14px;border-radius:var(--rs);border:none;font-size:16px;font-weight:700;cursor:pointer}
.mbtn.ok{background:var(--aa);color:#0d1117}
.mbtn.cancel{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.winner-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:28px}
.winner-overlay.show{display:flex}
.wt2{font-size:64px}.wn{font-size:30px;font-weight:800}.ws2{font-size:16px;color:var(--muted)}
.wbtn{margin-top:12px;padding:15px 40px;border-radius:var(--r);border:none;background:var(--aa);color:#0d1117;font-size:17px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="tabs">
  <button class="tab active" id="tab-v" onclick="setSport('voley')">🏐 Voleibol</button>
  <button class="tab" id="tab-b" onclick="setSport('basket')">🏀 Básquetbol</button>
</div>
<div class="status" id="status-bar">Set 1</div>
<div class="scoreboard">
  <div class="team">
    <input class="team-name" id="name-a" value="LOCAL" maxlength="10" oninput="save()">
    <div class="serve-row" id="srv-a"><div class="serve-dot"></div> SAQUE</div>
    <div class="score a" id="score-a" onclick="addPoint('a',1)">0</div>
    <div class="btn-row" id="btns-a"></div>
  </div>
  <div class="vs">—</div>
  <div class="team">
    <input class="team-name" id="name-b" value="VISITA" maxlength="10" oninput="save()">
    <div class="serve-row" id="srv-b"><div class="serve-dot"></div> SAQUE</div>
    <div class="score b" id="score-b" onclick="addPoint('b',1)">0</div>
    <div class="btn-row" id="btns-b"></div>
  </div>
</div>
<div class="history-bar">
  <span class="hl" id="hl">Sets</span>
  <div class="pills" id="pills"></div>
</div>
<div class="timer-block">
  <div class="timer-row">
    <div class="tdisp idle" id="tdisp">10:00</div>
    <div class="tbtns">
      <button class="tb go" id="btn-t" onclick="toggleTimer()">▶ Iniciar</button>
      <button class="tb" onclick="resetTimer()">↺ Reset</button>
    </div>
  </div>
  <div class="presets" id="presets"></div>
  <div class="mrow">
    <input class="minp" type="number" id="man-min" value="10" min="1" max="999" onchange="setTMin(this.value)">
    <span class="mlbl">min</span>
  </div>
</div>
<div class="bottom-bar">
  <button class="ctrl" onclick="undo()">↩ Deshacer</button>
  <button class="ctrl blue" id="btn-cfg" onclick="openSetup()">⚙ Configurar</button>
  <button class="ctrl red" onclick="confirmReset()">↺ Reiniciar</button>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>⚙ Configuración — Voleibol</h3>
    <div class="field">
      <label>Puntos para ganar el set</label>
      <div class="qbs" id="qb-pts"></div>
      <input class="finp" type="number" id="cfg-pts" value="25" min="1" max="99" oninput="syncQB('pts')">
    </div>
    <div class="field">
      <label>Diferencia mínima</label>
      <div class="qbs" id="qb-dif"></div>
      <input class="finp" type="number" id="cfg-dif" value="2" min="1" max="10" oninput="syncQB('dif')">
    </div>
    <div class="field">
      <label>Sets para ganar el partido</label>
      <div class="qbs" id="qb-sts"></div>
      <input class="finp" type="number" id="cfg-sts" value="3" min="1" max="9" oninput="syncQB('sts')">
    </div>
    <div class="mbtns">
      <button class="mbtn cancel" onclick="closeSetup()">Cancelar</button>
      <button class="mbtn ok" onclick="applySetup()">Aplicar</button>
    </div>
  </div>
</div>
<div class="winner-overlay" id="win-ov">
  <div class="wt2">🏆</div>
  <div class="wn" id="wn"></div>
  <div class="ws2" id="ws2"></div>
  <button class="wbtn" onclick="closeWinner()">Nuevo partido</button>
</div>
<script>
const PRESETS=[5,8,10,15];
const QBP=[10,15,21,25],QBD=[1,2],QBS=[1,2,3];
const SK='tanteadorEF_v2';
let sport='voley';
let cfg={points:25,diff:2,sets:3};
let sA=0,sB=0,stsA=0,stsB=0,curSet=1,stsHist=[],serving='a',gameOver=false;
let hist=[];
let tSecs=600,tTarget=600,tRunning=false,tInterval=null;

function init(){buildPresets();buildQBs();loadState();renderAll();renderT()}

function buildPresets(){
  const c=document.getElementById('presets');c.innerHTML='';
  PRESETS.forEach(m=>{const b=document.createElement('button');b.className='pbtn';b.textContent=m+' min';b.dataset.m=m;b.onclick=()=>setTMin(m);c.appendChild(b)});
  markP(tTarget/60)
}
function buildQBs(){bQBG('qb-pts',QBP,'points');bQBG('qb-dif',QBD,'diff');bQBG('qb-sts',QBS,'sets')}
function bQBG(id,vals,key){
  const c=document.getElementById(id);c.innerHTML='';
  vals.forEach(v=>{const b=document.createElement('button');b.className='qb'+(cfg[key]===v?' sel':'');b.textContent=v;b.onclick=()=>{document.getElementById('cfg-'+{points:'pts',diff:'dif',sets:'sts'}[key]).value=v;syncQB({points:'pts',diff:'dif',sets:'sts'}[key])};c.appendChild(b)})
}
function syncQB(id){
  const keyMap={pts:'points',dif:'diff',sts:'sets'};
  const valsMap={pts:QBP,dif:QBD,sts:QBS};
  const val=parseInt(document.getElementById('cfg-'+id).value);
  document.querySelectorAll('#qb-'+id+' .qb').forEach((b,i)=>b.classList.toggle('sel',valsMap[id][i]===val))
}

function setSport(s){
  sport=s;
  document.getElementById('tab-v').classList.toggle('active',s==='voley');
  document.getElementById('tab-b').classList.toggle('active',s==='basket');
  document.getElementById('btn-cfg').style.visibility=s==='voley'?'':'hidden';
  buildBtns();save();renderAll()
}
function buildBtns(){
  if(sport==='voley'){setBtns('a',[1],true);setBtns('b',[1],true)}
  else{setBtns('a',[1,2,3],true);setBtns('b',[1,2,3],true)}
}
function setBtns(t,adds,withSub){
  const row=document.getElementById('btns-'+t);row.innerHTML='';
  adds.forEach(v=>{const b=document.createElement('button');b.className='bp ba'+t;b.textContent='+'+v;b.onclick=()=>addPoint(t,v);row.appendChild(b)});
  if(withSub){const b=document.createElement('button');b.className='bp bs'+t;b.textContent='−1';b.onclick=()=>subPoint(t);row.appendChild(b)}
}

function addPoint(t,v){
  if(gameOver)return;pushH();
  if(t==='a')sA+=v;else sB+=v;
  if(sport==='voley'){serving=t;checkSet()}
  save();renderAll()
}
function subPoint(t){
  if(gameOver)return;pushH();
  if(t==='a'&&sA>0)sA--;else if(t==='b'&&sB>0)sB--;
  save();renderAll()
}
function undo(){if(!hist.length)return;const s=hist.pop();sA=s.sA;sB=s.sB;stsA=s.stsA;stsB=s.stsB;curSet=s.curSet;stsHist=JSON.parse(JSON.stringify(s.stsHist));serving=s.serving;gameOver=s.gameOver;save();renderAll()}
function pushH(){hist.push({sA,sB,stsA,stsB,curSet,stsHist:JSON.parse(JSON.stringify(stsHist)),serving,gameOver});if(hist.length>60)hist.shift()}

function checkSet(){
  const winA=sA>=cfg.points&&(sA-sB)>=cfg.diff;
  const winB=sB>=cfg.points&&(sB-sA)>=cfg.diff;
  if(!winA&&!winB)return;
  const w=winA?'a':'b';
  stsHist.push({a:sA,b:sB,w});
  if(w==='a')stsA++;else stsB++;
  if(stsA>=cfg.sets||stsB>=cfg.sets){
    gameOver=true;const name=stsA>=cfg.sets?nA():nB();
    sA=0;sB=0;save();renderAll();
    setTimeout(()=>showWin(name,stsA+'–'+stsB+' en sets'),120);return
  }
  sA=0;sB=0;curSet++;serving=w==='a'?'b':'a'
}

function confirmReset(){if(confirm('¿Reiniciar el partido? El cronómetro no se verá afectado.')){sA=0;sB=0;stsA=0;stsB=0;curSet=1;stsHist=[];serving='a';gameOver=false;hist=[];document.getElementById('win-ov').classList.remove('show');save();renderAll()}}
function closeWinner(){sA=0;sB=0;stsA=0;stsB=0;curSet=1;stsHist=[];serving='a';gameOver=false;hist=[];document.getElementById('win-ov').classList.remove('show');save();renderAll()}

function openSetup(){
  document.getElementById('cfg-pts').value=cfg.points;
  document.getElementById('cfg-dif').value=cfg.diff;
  document.getElementById('cfg-sts').value=cfg.sets;
  syncQB('pts');syncQB('dif');syncQB('sts');
  document.getElementById('modal').classList.add('open')
}
function closeSetup(){document.getElementById('modal').classList.remove('open')}
function applySetup(){
  cfg.points=parseInt(document.getElementById('cfg-pts').value)||25;
  cfg.diff=parseInt(document.getElementById('cfg-dif').value)||2;
  cfg.sets=parseInt(document.getElementById('cfg-sts').value)||3;
  closeSetup();save();renderAll()
}

function setTMin(m){m=parseInt(m)||10;tTarget=m*60;tSecs=tTarget;document.getElementById('man-min').value=m;markP(m);stopT();renderT();save()}
function markP(m){document.querySelectorAll('.pbtn').forEach(b=>b.classList.toggle('ap',parseInt(b.dataset.m)===parseInt(m)))}
function toggleTimer(){tRunning?stopT():startT()}
function startT(){
  tRunning=true;const b=document.getElementById('btn-t');b.textContent='⏸ Pausar';b.className='tb pause';
  tInterval=setInterval(()=>{tSecs--;renderT();saveTO();if(tSecs<=-3600)tSecs=0},1000)
}
function stopT(){clearInterval(tInterval);tRunning=false;const b=document.getElementById('btn-t');b.textContent='▶ Iniciar';b.className='tb go'}
function resetTimer(){stopT();tSecs=tTarget;renderT();save()}
function renderT(){
  const a=Math.abs(tSecs),m=Math.floor(a/60),s=a%60;
  const el=document.getElementById('tdisp');
  el.textContent=(tSecs<0?'-':'')+m+':'+String(s).padStart(2,'0');
  el.className='tdisp '+(tRunning?'run':tSecs<=0?'zero':'idle')
}

function nA(){return document.getElementById('name-a').value||'Local'}
function nB(){return document.getElementById('name-b').value||'Visita'}

function renderAll(){
  document.getElementById('score-a').textContent=sA;
  document.getElementById('score-b').textContent=sB;
  document.getElementById('srv-a').classList.toggle('v',sport==='voley'&&serving==='a');
  document.getElementById('srv-b').classList.toggle('v',sport==='voley'&&serving==='b');
  if(sport==='voley'){
    const near=(sA>=cfg.points-2||sB>=cfg.points-2)&&Math.abs(sA-sB)<=1&&!gameOver;
    const el=document.getElementById('status-bar');
    el.innerHTML='Set '+curSet+' — al '+cfg.points+' pts (dif. '+cfg.diff+') &nbsp;<span class="badge">'+stsA+' – '+stsB+'</span>';
    el.className='status'+(near?' ws':'');
    document.getElementById('hl').textContent='Sets';
    const p=document.getElementById('pills');p.innerHTML='';
    stsHist.forEach((s,i)=>{const d=document.createElement('div');d.className='pill '+(s.w==='a'?'wa':'wb');d.textContent='S'+(i+1)+': '+s.a+'–'+s.b;p.appendChild(d)})
  }else{
    document.getElementById('status-bar').innerHTML='Básquetbol';
    document.getElementById('status-bar').className='status';
    document.getElementById('hl').textContent='';
    document.getElementById('pills').innerHTML=''
  }
}
function showWin(name,sub){document.getElementById('wn').textContent=name+' gana';document.getElementById('ws2').textContent=sub;document.getElementById('win-ov').classList.add('show')}

function save(){
  try{localStorage.setItem(SK,JSON.stringify({sport,cfg,sA,sB,stsA,stsB,curSet,stsHist,serving,gameOver,nameA:document.getElementById('name-a').value,nameB:document.getElementById('name-b').value,tSecs,tTarget,manMin:document.getElementById('man-min').value}))}catch(e){}
}
function saveTO(){
  try{const r=localStorage.getItem(SK);if(!r)return;const d=JSON.parse(r);d.tSecs=tSecs;localStorage.setItem(SK,JSON.stringify(d))}catch(e){}
}
function loadState(){
  try{
    const r=localStorage.getItem(SK);if(!r){buildBtns();return}
    const d=JSON.parse(r);
    sport=d.sport||'voley';cfg=d.cfg||{points:25,diff:2,sets:3};
    sA=d.sA||0;sB=d.sB||0;stsA=d.stsA||0;stsB=d.stsB||0;
    curSet=d.curSet||1;stsHist=d.stsHist||[];serving=d.serving||'a';gameOver=d.gameOver||false;
    if(d.nameA)document.getElementById('name-a').value=d.nameA;
    if(d.nameB)document.getElementById('name-b').value=d.nameB;
    tTarget=d.tTarget||600;tSecs=d.tSecs||tTarget;
    if(d.manMin)document.getElementById('man-min').value=d.manMin;
    markP(tTarget/60);
    document.getElementById('tab-v').classList.toggle('active',sport==='voley');
    document.getElementById('tab-b').classList.toggle('active',sport==='basket');
    document.getElementById('btn-cfg').style.visibility=sport==='voley'?'':'hidden';
  }catch(e){}
  buildBtns()
}
init();
</script>
</body>
</html>
